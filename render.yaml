services:
  - type: web
    name: codeforge-api
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: node server/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DEFAULT_USER_PASSWORD
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
