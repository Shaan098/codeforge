version: '3.9'

services:
  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7-jammy
    container_name: codeforge-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: codeforge
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - codeforge-net

  # ── CodeForge App ──────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codeforge-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://mongo:27017/codeforge
      JWT_SECRET: ${JWT_SECRET:-codeforge_docker_secret_change_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      DEFAULT_USER_PASSWORD: ${DEFAULT_USER_PASSWORD:-codeforge123}
      PORT: 3000
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3000}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - codeforge-net

volumes:
  mongo_data:
    driver: local

networks:
  codeforge-net:
    driver: bridge
